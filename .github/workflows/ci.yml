name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-validate:
    name: Lint + checklist validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      # Install the project itself plus dev/test deps and pdfminer (used by
      # the small real-PDF test exercising _default_extract). litellm and
      # json_repair stay out of CI: tests inject a fake backend and the
      # json_repair salvage paths importorskip when it's absent.
      - name: Install dependencies
        run: |
          pip install -e ".[dev,pdf]"

      - name: Validate checklists and verify Markdown views are in sync
        run: |
          python -m tools.checklist_render --all --check

      - name: Lint (ruff)
        run: |
          ruff check tools/
 
      - name: Test suite
        run: pytest --tb=short
