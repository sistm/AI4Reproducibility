name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-validate:
    name: Lint + checklist validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      # Install the project itself plus dev/test deps and pdfminer (used by
      # the small real-PDF test exercising _default_extract). litellm and
      # json_repair stay out of CI: tests inject a fake backend and the
      # json_repair salvage paths importorskip when it's absent.
      - name: Install dependencies
        run: |
          pip install -e ".[dev,pdf]"

      - name: Validate checklists and verify Markdown views are in sync
        run: |
          python -m tools.checklist_render --all --check

      - name: Lint (ruff)
        run: |
          ruff check tools/
 
      - name: Test suite
        run: pytest --tb=short

  # Re-runs the test suite with the optional [pdf] and [orchestrator] extras
  # ABSENT, to enforce that optional deps stay optional. Anything that hard-
  # imports pdfminer / json_repair / litellm at module top — instead of going
  # through pytest.importorskip or a lazy import — fails here and not in the
  # main job. Previously this invariant was enforced only by a local
  # sitecustomize blocker that contributors had to set up manually, which
  # silently no-op'd on Python 3.12+ (legacy find_module API). CI itself is
  # the source of truth now.
  test-minimal-deps:
    name: Tests without optional extras
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (dev only — no [pdf], no [orchestrator])
        run: |
          pip install -e ".[dev]"

      # GitHub's ubuntu-latest hosted runner ships with pdfminer.six already
      # installed in the Python image, so `pip install -e .[dev]` alone does
      # NOT give a minimal environment — the verify step below would fail and
      # the test suite would unexpectedly exercise the pdf path. Uninstalling
      # explicitly is robust to future hosted-runner image changes too:
      # whatever the runner pre-installs, we strip down to the documented
      # [dev]-only set before checking. ``-y`` with missing packages prints a
      # warning and exits 0, so the step is idempotent.
      - name: Strip optional deps preinstalled in the runner image
        run: |
          pip uninstall -y pdfminer.six pdfminer json_repair litellm

      - name: Verify optional deps are actually absent
        run: |
          python -c "import importlib.util, sys; \
            missing = [m for m in ('pdfminer','json_repair','litellm') \
                       if importlib.util.find_spec(m) is None]; \
            print('missing as expected:', missing); \
            sys.exit(0 if set(missing) == {'pdfminer','json_repair','litellm'} else 1)"

      - name: Test suite (tests requiring optional deps must skip, not fail)
        run: pytest --tb=short
